name: Auto Merge Releases to Developer

on:
  push:
    branches:
      - releases

jobs:
  nightly-merge:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Full clone necessary for proper merge

    - name: Nightly Merge
      uses: robotology/gh-action-nightly-merge@v1.5.2
      with:
        stable_branch: 'releases'
        development_branch: 'developer'
        allow_ff: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
